# Local source-built OpenConnector for day-to-day development.
# Prefer: npm run docker:local
#
# Optional Proxyman bridge (only when you need the Proxyman provider):
#   docker compose -f docker/local/compose.yml -f docker/local/compose.proxyman.yml up -d
name: openconnector
services:
  connector:
    build:
      context: ../..
      dockerfile: docker/local/Dockerfile
    container_name: openconnector
    restart: unless-stopped
    ports:
      - "127.0.0.1:13000:3000"
    env_file:
      - ../../.env.openconnector
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      OOMOL_CONNECT_DATA_DIR: /app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openconnector-data:/app/data

volumes:
  openconnector-data:
