# Build overlay for local development.
#
# Builds the image from docker/Dockerfile instead of pulling the published one,
# and tags it as ghcr.io/oomol-lab/open-connector:latest (the name in docker-compose.yml).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
services:
  connector:
    build:
      context: .
      dockerfile: docker/Dockerfile
